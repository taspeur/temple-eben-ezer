<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bienvenue | Temple Eben-Ezer</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .welcome-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, rgba(10, 25, 47, 0.92), rgba(10, 25, 47, 0.85)),
                        url('https://images.unsplash.com/photo-1438232992991-995b7058bbb3?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80') center/cover no-repeat fixed;
            padding: 2rem;
        }

        .welcome-card {
            background: rgba(15, 35, 60, 0.95);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 20px;
            padding: 3rem;
            max-width: 480px;
            width: 100%;
            text-align: center;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.5);
            animation: fadeInUp 0.8s ease;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .welcome-logo {
            width: 150px;
            height: auto;
            border-radius: 15px;
            margin-bottom: 1.5rem;
            background: #fff;
            padding: 10px;
        }

        .welcome-card h1 {
            color: #fff;
            font-size: 1.8rem;
            margin-bottom: 0.3rem;
        }

        .welcome-card .subtitle {
            color: var(--accent-color);
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .welcome-card .tagline {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 2rem;
        }

        .tab-switcher {
            display: flex;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            margin-bottom: 2rem;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .tab-btn {
            flex: 1;
            padding: 0.8rem;
            border: none;
            background: transparent;
            color: var(--text-muted);
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .tab-btn.active {
            background: var(--accent-color);
            color: var(--primary-color);
        }

        .tab-btn:hover:not(.active) {
            background: rgba(255, 255, 255, 0.05);
        }

        .form-panel { display: none; }
        .form-panel.active { display: block; }

        .welcome-form .field {
            margin-bottom: 1rem;
            text-align: left;
        }

        .welcome-form .field label {
            display: block;
            color: var(--text-muted);
            font-size: 0.8rem;
            font-weight: 600;
            margin-bottom: 0.3rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .welcome-form .field input {
            width: 100%;
            padding: 0.85rem 1rem;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            transition: border-color 0.3s ease;
            box-sizing: border-box;
        }

        .welcome-form .field input:focus {
            outline: none;
            border-color: var(--accent-color);
        }

        .welcome-form .field input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        .submit-btn {
            width: 100%;
            padding: 1rem;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, var(--accent-color), #c5973a);
            color: var(--primary-color);
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            margin-top: 0.5rem;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(212, 175, 55, 0.3);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .welcome-footer {
            margin-top: 2rem;
            color: var(--text-muted);
            font-size: 0.8rem;
        }

        .welcome-footer a {
            color: var(--accent-color);
            text-decoration: none;
        }

        .verset-welcome {
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            font-style: italic;
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.85rem;
            line-height: 1.6;
        }

        .verset-welcome .ref {
            color: var(--accent-color);
            font-weight: 600;
            font-style: normal;
            display: block;
            margin-top: 0.5rem;
        }
    </style>
</head>
<body>
    <img src="https://tse3.mm.bing.net/th/id/OIP.Y-EC0XyjbvVGH3ZyhFHExgHaHa?rs=1&pid=ImgDetMain&o=7&rm=3" alt="Logo" class="top-right-logo">
    <div class="welcome-page">
        <div class="welcome-card">
            <img src="https://tse1.mm.bing.net/th/id/OIP.YL2roIxn1owfBYM6uV2c1wHaDe?rs=1&pid=ImgDetMain&o=7&rm=3" alt="Temple Eben-Ezer" class="welcome-logo">
            <h1>Temple Eben-Ezer</h1>
            <p class="subtitle">Une Église Famille</p>
            <p class="tagline">Unité · Sainteté · Consécration</p>

            <!-- Tabs -->
            <div class="tab-switcher">
                <button class="tab-btn active" onclick="switchTab('connexion')">Connexion</button>
                <button class="tab-btn" onclick="switchTab('inscription')">Inscription</button>
            </div>

            <!-- Inscription Form -->
            <div id="panel-inscription" class="form-panel">
                <form class="welcome-form" onsubmit="handleRegister(event)">
                    <div class="field">
                        <label>Nom Complet</label>
                        <input type="text" id="reg-name" placeholder="Votre nom et prénom" required>
                    </div>
                    <div class="field">
                        <label>Votre Email</label>
                        <input type="email" id="reg-email" placeholder="nom@exemple.com" required>
                    </div>
                    <button type="submit" class="submit-btn" style="background: linear-gradient(135deg, #2ecc71, #27ae60);">
                        <i class="fa-solid fa-user-plus"></i> Créer mon compte
                    </button>
                </form>
            </div>

            <!-- Connexion Form -->
            <div id="panel-connexion" class="form-panel active">
                <form class="welcome-form" id="loginFormWelcome" onsubmit="handleLogin(event)">
                    <div class="field">
                        <label>Votre Email</label>
                        <input type="email" id="log-email" placeholder="teeguesnathansam@gmail.com" required>
                    </div>
                    <p style="color: var(--text-muted); font-size: 0.75rem; margin-top: -0.5rem; margin-bottom: 1rem;">(Accès sécurisé par email uniquement)</p>
                    <button type="submit" class="submit-btn">
                        <i class="fa-solid fa-right-to-bracket"></i> Entrer dans l'Espace
                    </button>
                </form>
            </div>

            <div class="verset-welcome">
                <span id="welcome-verset-texte">« Jusqu'ici l'Éternel nous a secourus. »</span>
                <span class="ref" id="welcome-verset-ref">— 1 Samuel 7:12</span>
            </div>

            <p class="welcome-footer">&copy; 2026 Temple Eben-Ezer · Assemblées de Dieu</p>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/versets.js"></script>
    <script>
        // ===== Tab Logic =====
        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.form-panel').forEach(p => p.classList.remove('active'));
            if (tab === 'inscription') {
                document.querySelector('.tab-btn:nth-child(2)').classList.add('active');
                document.getElementById('panel-inscription').classList.add('active');
            } else {
                document.querySelector('.tab-btn:nth-child(1)').classList.add('active');
                document.getElementById('panel-connexion').classList.add('active');
            }
        }

        // ===== Check if already logged in =====
        const session = JSON.parse(localStorage.getItem('ebenezer_session'));
        if (session) {
            window.location.href = 'index.html';
        }

        // ===== Register =====
        function handleRegister(e) {
            e.preventDefault();
            const name = document.getElementById('reg-name').value.trim();
            const email = document.getElementById('reg-email').value.trim();

            if (!name || !email) {
                alert('Veuillez remplir tous les champs.');
                return;
            }

            const success = auth.register(name, email, ""); // No password needed now
            if (success) {
                alert('Bienvenue ' + name + ' ! \nVotre compte a été crée avec succès.');
                window.location.href = 'index.html';
            }
        }

        // ===== Login =====
        function handleLogin(e) {
            e.preventDefault();
            const email = document.getElementById('log-email').value.trim();
            auth.login(email);
        }

        // ===== Initialisation =====
        document.addEventListener('DOMContentLoaded', () => {
            if (typeof getVersetDuJour === 'function') {
                const v = getVersetDuJour();
                document.getElementById('welcome-verset-texte').textContent = '« ' + v.texte + ' »';
                document.getElementById('welcome-verset-ref').textContent = '— ' + v.ref;
            }
        });
    </script>

    <!-- Floating Language Selector -->
    <div class="floating-lang-container">
        <div class="lang-icon">
            <i class="fa-solid fa-globe"></i>
        </div>
        <div id="google_translate_element"></div>
    </div>
    <!-- Google Translate Script -->
    <script type="text/javascript">
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({pageLanguage: 'fr', autoDisplay: false}, 'google_translate_element');
        }
    </script>
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
</body>
</html>
